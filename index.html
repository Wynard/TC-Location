<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Location Extension</title>
  <script src="https://components.connect.trimble.com/trimble-connect-workspace-api/index.js"></script>
  <style>
    body { font-family: Arial, sans-serif; padding: 16px; }
    button { padding: 12px 16px; font-size: 16px; }
    #out { margin-top: 12px; white-space: pre-wrap; }
  </style>
</head>
<body>
  <h1>Get device location</h1>
  <button id="locBtn">Try it</button>
  <div id="out">Waiting…</div>

  <script>
    let API;
    const out = document.getElementById("out");

    async function init() {
      try {
        API = await TrimbleConnectWorkspace.connect(window.parent, (event, data) => {
          console.log("TC event:", event, data);
        });
        out.textContent = "Extension connected. Tap 'Try it'.";
      } catch (err) {
        out.textContent = "Trimble connection failed: " + err.message;
      }
    }

    function showPosition(position) {
      out.textContent =
        "Latitude: " + position.coords.latitude + "\n" +
        "Longitude: " + position.coords.longitude + "\n" +
        "Accuracy: " + position.coords.accuracy + " m";
    }

    function showError(error) {
  if (error.code === error.PERMISSION_DENIED) {
    out.textContent =
      "Location denied. On Trimble Connect mobile this likely means geolocation is blocked for the embedded iframe, not necessarily that the user rejected the prompt.";
    return;
  }
  if (error.code === error.POSITION_UNAVAILABLE) {
    out.textContent = "Location unavailable.";
    return;
  }
  if (error.code === error.TIMEOUT) {
    out.textContent = "Location request timed out.";
    return;
  }
  out.textContent = "Unknown geolocation error.";
}

    document.getElementById("locBtn").addEventListener("click", () => {
      if (!window.isSecureContext) {
        out.textContent = "This page is not running in a secure context.";
        return;
      }

      if (!navigator.geolocation) {
        out.textContent = "Geolocation is not supported by this browser.";
        return;
      }

      out.textContent = "Requesting location...";
      navigator.geolocation.getCurrentPosition(
        showPosition,
        showError,
        { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
      );
    });

    init();
    console.log("secure?", window.isSecureContext);
    console.log("geolocation exists?", !!navigator.geolocation);

    if (document.permissionsPolicy) {
      console.log("allowed features", document.permissionsPolicy.allowedFeatures?.());
    }
    if (document.featurePolicy) {
      console.log("geolocation allowed?", document.featurePolicy.allowsFeature?.("geolocation"));
    }
  </script>
</body>
</html>
